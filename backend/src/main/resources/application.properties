spring.application.name=Assetflow_Nexora
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/Assetflow_Nexora
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.secret=${JWT_SECRET:assetflow-local-development-secret-change-before-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${MAIL_FROM:${SMTP_USERNAME:}}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

# =============================================================================
# JPA / HIBERNATE CONFIGURATION
# =============================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# FLYWAY MIGRATION
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.storage.upload-dir=${UPLOAD_DIR:../storage/uploads}
