<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><style>body{font-family:Arial;color:#182433;margin:32px}h1{color:#0b5cab}.summary{background:#f5f8fc;padding:12px;margin:16px 0}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#0b5cab;color:white;text-align:left;padding:9px}td{padding:8px;border-bottom:1px solid #dbe4ef}</style></head><body><h1 th:text="${title}">Audit Cycle</h1><div class="summary"><b th:text="${cycle.name}"></b> · <span th:text="${cycle.status}"></span> · <span th:text="${cycle.start_date}"></span> to <span th:text="${cycle.end_date}"></span></div><table><thead><tr><th>Tag</th><th>Asset</th><th>Verification</th><th>Notes</th></tr></thead><tbody><tr th:each="row:${rows}"><td th:text="${row.asset_tag}"></td><td th:text="${row.name}"></td><td th:text="${row.verification_status}"></td><td th:text="${row.notes}"></td></tr></tbody></table></body></html>
