<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><style>body{font-family:Arial;color:#182433;margin:32px}h1{color:#0b5cab}.meta{color:#617083;margin-bottom:22px}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#0b5cab;color:white;text-align:left;padding:9px}td{padding:8px;border-bottom:1px solid #dbe4ef}tr:nth-child(even){background:#f5f8fc}</style></head><body><h1 th:text="${title}">Asset Register</h1><div class="meta">Generated <span th:text="${generatedAt}"></span></div><table><thead><tr><th>Tag</th><th>Asset</th><th>Serial Number</th><th>Condition</th><th>Status</th><th>Location</th></tr></thead><tbody><tr th:each="row:${rows}"><td th:text="${row.asset_tag}"></td><td th:text="${row.name}"></td><td th:text="${row.serial_number}"></td><td th:text="${row.condition}"></td><td th:text="${row.status}"></td><td th:text="${row.location}"></td></tr></tbody></table></body></html>
